server:
  port: ${PORT:8080}

spring:
  application:
    name: task-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:codecrafters_ai}
    username: ${DB_USER:codecrafters}
    password: ${DB_PASSWORD:codecrafters}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  ai-service-url: ${AI_SERVICE_URL:http://localhost:8083}
  jwt:
    secret: ${JWT_SECRET:dev-codecrafters-auth-secret-key-change-before-production}
